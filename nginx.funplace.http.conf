# ── УСТАРЕЛО — НЕ ИСПОЛЬЗОВАТЬ ───────────────────────────────────────────────
#
# Этот файл был рассчитан на внешний (хостовый) nginx, которого нет на сервере.
# Actуальный конфиг для funplace.pro находится в:
#   backend/offers/esoteric/nginx/prod/funplace.conf
#
# Esoteric_nginx обслуживает оба домена: esotericvision.ru и funplace.pro.
# SSL получается через ./ssl-init.sh, который использует esoteric_certbot.
# ─────────────────────────────────────────────────────────────────────────────
#
# ── ШАГ 1: Bootstrap-конфиг (применять ДО получения SSL-сертификата) ─────────
#
# Что сделать:
#   1. Добавить в nginx-контейнер два volume (см. ниже)
#   2. Скопировать этот файл внутрь контейнера как funplace.conf
#   3. Запустить ./ssl-init.sh
#   4. После получения сертификата заменить на nginx.funplace.conf
#
# Volumes для nginx-контейнера (добавить в его docker-compose.yml):
#   - /var/www/certbot:/var/www/certbot:ro
#   - /etc/letsencrypt:/etc/letsencrypt:ro

server {
    listen 80;
    server_name funplace.pro www.funplace.pro;

    # Certbot пишет сюда файл проверки, Let's Encrypt его читает
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'waiting for ssl...';
        add_header Content-Type text/plain;
    }
}
