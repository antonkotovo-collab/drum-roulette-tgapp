# ── УСТАРЕЛО — НЕ ИСПОЛЬЗОВАТЬ ───────────────────────────────────────────────
#
# Этот файл был рассчитан на внешний (хостовый) nginx, которого нет на сервере.
# Actуальный конфиг для funplace.pro находится в:
#   backend/offers/esoteric/nginx/prod/funplace.conf
#
# Esoteric_nginx обслуживает оба домена: esotericvision.ru и funplace.pro.
# ─────────────────────────────────────────────────────────────────────────────
#
# ── ШАГ 2: Финальный конфиг с SSL (применять ПОСЛЕ получения сертификата) ────
#
# Volumes для nginx-контейнера (должны быть добавлены в его docker-compose.yml):
#   - /var/www/certbot:/var/www/certbot:ro
#   - /etc/letsencrypt:/etc/letsencrypt:ro

# HTTP → HTTPS редирект + ACME-проверка для авто-обновления
server {
    listen 80;
    server_name funplace.pro www.funplace.pro;

    # Certbot использует этот путь при обновлении сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://funplace.pro$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name funplace.pro www.funplace.pro;

    ssl_certificate     /etc/letsencrypt/live/funplace.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/funplace.pro/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # www → без www
    if ($host = www.funplace.pro) {
        return 301 https://funplace.pro$request_uri;
    }

    # Весь трафик → baraban_frontend (порт 8081 на хосте)
    # frontend-nginx сам проксирует /api/* → backend
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
