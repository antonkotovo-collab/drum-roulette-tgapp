<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барабан — Админ панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0a1e;
            color: #e9d5ff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #d4a5f5, #f0abfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(200, 185, 230, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(120, 180, 255, 0.06));
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 16px;
            font-weight: 700;
            color: #c084fc;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: rgba(200, 185, 230, 0.6);
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 12px 14px;
            color: #e9d5ff;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
            font-family: inherit;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: rgba(192, 132, 252, 0.6);
        }

        textarea {
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9333ea, #db2777);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
        }

        .stat-num {
            font-size: 28px;
            font-weight: 900;
            color: #d4a5f5;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(200, 185, 230, 0.5);
            margin-top: 4px;
        }

        .result {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
        }

        .result.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .result.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🥁 Админ-панель</h1>
        <p class="subtitle">Барабанная Рулетка — управление рассылками</p>

        <!-- Авторизация -->
        <div class="card" id="authCard">
            <h2>🔐 Авторизация</h2>
            <label>Admin Token</label>
            <input type="password" id="adminToken" placeholder="Введите токен из .env (ADMIN_TOKEN)">
            <button onclick="loadStats()">Войти и загрузить статистику</button>
        </div>

        <!-- Статистика -->
        <div id="statsSection" style="display:none">
            <div class="stats">
                <div class="stat">
                    <div class="stat-num" id="statBotUsers">—</div>
                    <div class="stat-label">Запустили бота</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="statMiniApp">—</div>
                    <div class="stat-label">Открыли мини-апп</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="statSpins">—</div>
                    <div class="stat-label">Всего спинов</div>
                </div>
                <div class="stat" style="grid-column: span 3; background: rgba(168,85,247,0.18);">
                    <div class="stat-num" id="statReachable" style="color: #f0abfc;">—</div>
                    <div class="stat-label">📢 Получат рассылку (уникальных)</div>
                </div>
            </div>

            <!-- Рассылка -->
            <div class="card">
                <h2>📢 Рассылка</h2>
                <label>Текст сообщения (поддерживается HTML: &lt;b&gt;, &lt;i&gt;, &lt;a href&gt;)</label>
                <textarea id="broadcastText" placeholder="Привет! 🎡 У нас новые призы — заходи крутить!"></textarea>
                <button onclick="sendBroadcast()" id="broadcastBtn">📤 Отправить всем</button>
                <div class="result" id="broadcastResult"></div>
            </div>
        </div>
    </div>

    <script>
        // Локально (Vite dev server или file://) → бэкенд на 3001
        const API = (location.hostname === 'localhost' || location.protocol === 'file:')
            ? 'http://localhost:3001'
            : '';

        function getToken() {
            return document.getElementById('adminToken').value.trim();
        }

        async function loadStats() {
            const token = getToken();
            if (!token) return alert('Введите токен');

            try {
                const res = await fetch(`${API}/api/admin/stats`, {
                    headers: { 'x-admin-token': token, 'Content-Type': 'application/json' }
                });
                if (!res.ok) { alert('Неверный токен или ошибка сервера'); return; }
                const data = await res.json();

                document.getElementById('statBotUsers').textContent = data.botUsers;
                document.getElementById('statMiniApp').textContent = data.miniAppUsers;
                document.getElementById('statSpins').textContent = data.spinResults;
                document.getElementById('statReachable').textContent = data.totalReachable;
                document.getElementById('statsSection').style.display = 'block';
            } catch (e) {
                alert('Ошибка соединения: ' + e.message);
            }
        }

        async function sendBroadcast() {
            const token = getToken();
            const text = document.getElementById('broadcastText').value.trim();
            if (!text) return alert('Введите текст сообщения');
            if (!confirm(`Отправить рассылку всем пользователям?`)) return;

            const btn = document.getElementById('broadcastBtn');
            const result = document.getElementById('broadcastResult');
            btn.disabled = true;
            btn.textContent = '⏳ Отправляем...';

            try {
                const res = await fetch(`${API}/api/admin/broadcast`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken: token, text })
                });
                const data = await res.json();
                if (res.ok) {
                    result.className = 'result success';
                    result.textContent = `✅ Рассылка запущена! Получателей: ${data.total}`;
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ Ошибка: ${data.error}`;
                }
                result.style.display = 'block';
            } catch (e) {
                result.className = 'result error';
                result.textContent = `❌ Ошибка соединения: ${e.message}`;
                result.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 Отправить всем';
            }
        }
    </script>
</body>

</html>
